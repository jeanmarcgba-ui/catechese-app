<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catéchèse - Gestion Paroissiale</title>
<link rel="icon" id="favicon" href="">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bleu-nuit:#0f2447;
    --bleu:#1a3a6b;
    --or:#c9a227;
    --or-clair:#e8c96a;
    --fond:#f4f6fb;
    --blanc:#ffffff;
    --gris:#6b7280;
    --rouge:#b91c1c;
    --vert:#15803d;
    --rouge-bordeaux:#7f1d3a;
    --vert-fonce:#173d2e;
    --vert-fonce-clair:#1f5039;
    --beige:#ede3c8;
    --gris-fonce:#2b2d31;
    --gris-fonce-clair:#3a3d42;
    --bleu-gris:#51677a;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Roboto,Arial,sans-serif;background:var(--fond);color:#1f2937;min-height:100vh;}

  /* ---------- CONFIG BANNER (setup requis) ---------- */
  #configBanner{display:none;background:#fef3c7;color:#92400e;padding:10px 16px;text-align:center;font-size:14px;}

  /* ---------- LOGIN ---------- */
  #loginScreen{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(160deg,var(--bleu-nuit),var(--bleu));
    padding:24px;
  }
  .menuBand{
    width:100%;max-width:420px;background:rgba(255,255,255,0.08);border-radius:var(--radius) var(--radius) 0 0;
    padding:14px 20px;text-align:center;color:var(--or-clair);letter-spacing:2px;font-weight:600;font-size:13px;
    text-transform:uppercase;border-bottom:2px solid var(--or);
  }
  .logoWrap{margin:22px 0 10px;display:flex;align-items:center;justify-content:center;}
  .logoWrap img{max-width:110px;max-height:110px;border-radius:50%;background:#fff;padding:6px;box-shadow:0 6px 18px rgba(0,0,0,.35);}
  .logoPlaceholder{
    width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.1);border:2px dashed var(--or-clair);
    display:flex;align-items:center;justify-content:center;color:var(--or-clair);font-size:11px;text-align:center;padding:8px;
  }
  .loginCard{
    width:100%;max-width:420px;background:var(--blanc);border-radius:0 0 var(--radius) var(--radius);
    padding:28px 26px 32px;box-shadow:0 20px 50px rgba(0,0,0,.35);
  }
  .loginCard h1{font-size:19px;color:var(--bleu-nuit);text-align:center;margin-bottom:4px;}
  .loginCard p.sub{text-align:center;color:var(--gris);font-size:13px;margin-bottom:20px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--bleu-nuit);margin-bottom:6px;}
  .field input,.field select{
    width:100%;padding:11px 12px;border:1.5px solid #dfe4ee;border-radius:9px;font-size:14px;background:#fbfcfe;
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--or);}
  .btn{
    width:100%;padding:12px;border:none;border-radius:9px;background:var(--bleu-nuit);color:#fff;font-weight:600;
    font-size:14px;cursor:pointer;transition:background .2s;
  }
  .btn:hover{background:var(--bleu);}
  .btn.gold{background:var(--or);color:var(--bleu-nuit);}
  .btn.gold:hover{background:var(--or-clair);}
  .btn.ghost{background:transparent;border:1.5px solid var(--bleu-nuit);color:var(--bleu-nuit);}
  .btn.danger{background:var(--rouge);}
  .errMsg{color:var(--rouge);font-size:13px;text-align:center;margin-top:10px;min-height:16px;}

  /* ---------- APP SHELL ---------- */
  #appShell{display:none;min-height:100vh;}
  .topbar{
    background:var(--bleu-nuit);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:20;
  }
  .topbar .brand{display:flex;align-items:center;gap:10px;}
  .topbar .brand img{width:34px;height:34px;border-radius:50%;background:#fff;}
  .topbar .brand span{font-weight:700;font-size:15px;}
  .topbar .userInfo{display:flex;align-items:center;gap:12px;font-size:13px;}
  .topbar .userInfo .role{background:var(--or);color:var(--bleu-nuit);padding:3px 10px;border-radius:20px;font-weight:700;font-size:11px;text-transform:uppercase;}
  .topbar button{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;}
  .topbar button:hover{background:rgba(255,255,255,.15);}

  .layout{display:flex;min-height:calc(100vh - 58px);}
  .sidebar{
    width:250px;background:var(--vert-fonce);border-right:1px solid rgba(0,0,0,.2);padding:16px 0;flex-shrink:0;
    position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;
  }
  .sidebar button.menuItem{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;
    padding:12px 20px;font-size:13.5px;color:var(--beige);cursor:pointer;border-left:3px solid transparent;
  }
  .sidebar button.menuItem:hover{background:var(--vert-fonce-clair);}
  .sidebar button.menuItem.active{background:var(--vert-fonce-clair);border-left-color:var(--or);color:#fff;font-weight:700;}
  .sidebar button.menuItem .dot{width:6px;height:6px;border-radius:50%;background:var(--or);opacity:0;}
  .sidebar button.menuItem.active .dot{opacity:1;}

  .content{flex:1;padding:26px 30px;overflow-x:auto;}
  .content h2{color:var(--bleu-nuit);font-size:20px;margin-bottom:6px;}
  .content .breadcrumb{color:var(--gris);font-size:13px;margin-bottom:22px;}

  .card{background:var(--blanc);border-radius:var(--radius);padding:22px;box-shadow:0 2px 10px rgba(15,36,71,.06);margin-bottom:20px;}
  .card h3{color:var(--bleu-nuit);font-size:15px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #eef1f7;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:700px){.grid2{grid-template-columns:1fr;} .sidebar{position:fixed;left:-260px;top:58px;bottom:0;transition:left .25s;z-index:15;box-shadow:4px 0 20px rgba(0,0,0,.15);} .sidebar.open{left:0;} .content{padding:18px;}}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  table th{text-align:left;background:#f4f6fb;color:var(--bleu-nuit);padding:10px 12px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;}
  table td{padding:10px 12px;border-bottom:1px solid #f0f2f7;}
  table tr:hover td{background:#fafbfe;}
  .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge.createur{background:#fde68a;color:#92400e;}
  .badge.responsable{background:#bfdbfe;color:#1e3a8a;}
  .badge.secretariat{background:#d9f99d;color:#365314;}
  .badge.animateur{background:#fbcfe8;color:#831843;}
  .badge.aumonier{background:#ddd6fe;color:#4c1d95;}

  .placeholder{
    text-align:center;padding:60px 20px;color:var(--gris);
  }
  .placeholder .icon{font-size:40px;margin-bottom:10px;}

  .optTabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .optTabs button{
    padding:9px 16px;border-radius:9px;border:1.5px solid #dfe4ee;background:#fff;font-size:13px;cursor:pointer;color:#374151;
  }
  .optTabs button.active{background:var(--bleu-nuit);color:#fff;border-color:var(--bleu-nuit);}

  .rowFlex{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .smallBtn{padding:7px 12px;font-size:12px;border-radius:7px;border:none;cursor:pointer;}
  .smallBtn.edit{background:#dbeafe;color:#1e40af;}
  .smallBtn.del{background:#fee2e2;color:#991b1b;}

  .toast{
    position:fixed;bottom:20px;right:20px;background:var(--bleu-nuit);color:#fff;padding:12px 18px;border-radius:9px;
    font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:100;opacity:0;transform:translateY(10px);transition:all .3s;
  }
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.error{background:var(--rouge);}

  /* Présence & notifications */
  .presenceWidget{position:relative;}
  .presenceDot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px;}
  .presenceDropdown{
    position:absolute;top:38px;right:0;background:#fff;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);
    padding:10px;min-width:180px;z-index:50;display:none;
  }
  .presenceDropdown.open{display:block;}
  .presenceDropdown div{padding:6px 8px;font-size:13px;color:#1f2937;display:flex;align-items:center;}
  .menuBadge{
    background:var(--rouge);color:#fff;font-size:10px;font-weight:700;border-radius:10px;
    padding:1px 6px;margin-left:auto;
  }
  .contactDot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0;}
  .contactDot.online{background:#22c55e;}
  .contactDot.offline{background:#c9ccd1;}
  #notifPanel{
    position:fixed;bottom:20px;right:20px;width:300px;max-width:calc(100vw - 40px);z-index:200;
  }
  .notifCard{
    background:#fff;border-left:4px solid var(--or);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);
    padding:12px 14px;margin-top:10px;cursor:pointer;animation:notifIn .25s ease;
  }
  .notifCard:hover{background:#fafbfe;}
  .notifCard b{color:var(--bleu-nuit);}
  .notifCard .notifPreview{color:var(--gris);font-size:12.5px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  @keyframes notifIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="configBanner">⚠️ Configuration Supabase manquante — voir les instructions en haut du fichier index.html</div>

<!-- ===================== ÉCRAN DE CONNEXION ===================== -->
<div id="loginScreen">
  <div class="menuBand" id="loginParoisseNom">CATÉCHÈSE</div>
  <div class="logoWrap" id="logoWrap">
    <img src="" id="loginLogoImg" alt="Logo Application Catéchèse">
  </div>
  <div class="loginCard">
    <h1>Connexion</h1>
    <p class="sub">Application de gestion de la catéchèse</p>
    <div class="field">
      <label>Nom d'utilisateur</label>
      <input type="text" id="loginNom" placeholder="Votre nom">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="btn" onclick="handleLogin()">Se connecter</button>
    <div class="errMsg" id="loginErr"></div>
  </div>
</div>

<!-- ===================== APPLICATION ===================== -->
<div id="appShell">
  <div class="topbar">
    <div class="brand">
      <img id="topbarLogo" src="" alt="">
      <span id="topbarParoisse">CATÉCHÈSE</span>
    </div>
    <div class="userInfo">
      <div class="presenceWidget">
        <button onclick="togglePresenceDropdown()" id="presenceBtn">🟢 0 en ligne</button>
        <div class="presenceDropdown" id="presenceDropdown"></div>
      </div>
      <span id="topbarUserName"></span>
      <span class="role" id="topbarUserRole"></span>
      <button onclick="actualiserPageCourante()" id="refreshBtn" title="Recharger les données de cette page">🔄 Actualiser</button>
      <button onclick="toggleSidebar()" id="burgerBtn" style="display:none;">☰ Menu</button>
      <button onclick="handleLogout()">Déconnexion</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="notifPanel"></div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIGURATION SUPABASE
   Remplace les deux valeurs ci-dessous par celles de ton projet
   Supabase (Project Settings > API), puis exécute schema.sql
   dans l'éditeur SQL de Supabase avant la première utilisation.
   ============================================================ */
const SUPABASE_URL = "https://rbnsymxybhihspknfqdb.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJibnN5bXh5YmhpaHNwa25mcWRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NTk4MDQsImV4cCI6MjA5ODAzNTgwNH0.S5Fhnsxhp2-fpThZnCksMoYNyHg-7Kr0FVtGX0ZEdUY";

const SQL_SCHEMA = `-- ============================================================
-- SCHEMA COMPLET - Application de gestion de la Catéchèse
-- À exécuter dans Supabase : SQL Editor > New Query > Run
-- ============================================================

-- Configuration de la paroisse (Phase 1)
create table if not exists catechese_app_config (
  id int primary key default 1,
  nom_paroisse text,
  nom_diocese text,
  logo_url text,
  telephone text,
  annee_catechese text,
  periode_debut date,
  periode_fin date,
  montant_inscription numeric default 0,
  constraint single_row check (id = 1)
);
insert into catechese_app_config (id) values (1) on conflict (id) do nothing;

-- Utilisateurs et rôles (Phase 1)
create table if not exists catechese_app_users (
  id uuid primary key default gen_random_uuid(),
  nom text not null,
  nom_utilisateur text unique,
  mot_de_passe text not null,
  role text not null check (role in ('createur','responsable','secretariat','animateur','aumonier')),
  photo_url text,
  created_at timestamptz default now()
);

-- Si la table existait déjà avant cette mise à jour, on ajoute la colonne manquante :
alter table catechese_app_users add column if not exists nom_utilisateur text;

-- Classes de catéchèse (Phase 1)
create table if not exists catechese_classes (
  id uuid primary key default gen_random_uuid(),
  nom text not null,
  categorie text not null check (categorie in ('enfants','jeunes','adultes')),
  effectif_max int default 30,
  animateur_id uuid,
  created_at timestamptz default now()
);

-- Catéchumènes (Phase 2)
create table if not exists catechese_catechumenes (
  id uuid primary key default gen_random_uuid(),
  nom text not null,
  prenom text not null,
  date_naissance date,
  lieu_naissance text,
  quartier text,
  ceb text,
  baptise boolean default false,
  date_bapteme date,
  lieu_bapteme text,
  categorie text check (categorie in ('enfants','jeunes','adultes')),
  statut text check (statut in ('ancien','nouveau')),
  telephone text,
  photo_url text,
  pieces_jointes jsonb default '[]',
  class_id uuid references catechese_classes(id),
  created_at timestamptz default now()
);

-- Parents (Phase 2)
create table if not exists catechese_parents (
  id uuid primary key default gen_random_uuid(),
  catechumene_id uuid references catechese_catechumenes(id) on delete cascade,
  nom_pere text,
  prenom_pere text,
  nom_mere text,
  prenom_mere text,
  contact_parents text
);

-- Animateurs (Phase 2)
create table if not exists catechese_animateurs (
  id uuid primary key default gen_random_uuid(),
  nom text not null,
  prenom text not null,
  date_naissance date,
  profession text,
  sacrement text check (sacrement in ('baptise','confirme','les_deux')),
  telephone text,
  email text,
  adresse text,
  statut text check (statut in ('nouveau','experimente')),
  ancienne_paroisse text,
  ancien_diocese text,
  photo_url text,
  class_id uuid references catechese_classes(id),
  created_at timestamptz default now()
);

-- Notes (Phase 3)
create table if not exists catechese_notes (
  id uuid primary key default gen_random_uuid(),
  catechumene_id uuid references catechese_catechumenes(id) on delete cascade,
  note1 numeric, note2 numeric, note3 numeric,
  note4 numeric, note5 numeric, note6 numeric,
  moyenne numeric,
  annee_catechese text
);

-- Paiements / Comptabilité (Phase 4)
create table if not exists catechese_paiements (
  id uuid primary key default gen_random_uuid(),
  catechumene_id uuid references catechese_catechumenes(id),
  annee_catechese text,
  montant_total numeric,
  avance numeric,
  reste numeric,
  type_paiement text,
  date_paiement date default current_date,
  created_at timestamptz default now()
);

create table if not exists catechese_depenses (
  id uuid primary key default gen_random_uuid(),
  libelle text,
  montant numeric,
  date_depense date default current_date,
  created_at timestamptz default now()
);

-- Attestations (Phase 4)
create table if not exists catechese_attestations (
  id uuid primary key default gen_random_uuid(),
  catechumene_id uuid references catechese_catechumenes(id),
  nom_curé_responsable text,
  qualite text,
  raison text,
  ville text,
  date_delivrance date default current_date,
  created_at timestamptz default now()
);

-- Actualités (Phase 5)
create table if not exists catechese_actualites (
  id uuid primary key default gen_random_uuid(),
  auteur text,
  contenu text,
  created_at timestamptz default now(),
  lu_par jsonb default '[]'
);

-- Messagerie (Phase 5)
create table if not exists catechese_messages (
  id uuid primary key default gen_random_uuid(),
  expediteur_nom text,
  destinataire_nom text,
  contenu text,
  type_message text check (type_message in ('texte','photo','video','vocal')),
  media_url text,
  modifie boolean default false,
  lu boolean default false,
  created_at timestamptz default now()
);

-- Présence en ligne des utilisateurs
create table if not exists catechese_presence (
  nom text primary key,
  derniere_connexion timestamptz default now()
);

-- Sécurité : l'application gère ses propres droits d'accès par rôle (voir Option),
-- donc la RLS (Row Level Security) de Supabase est désactivée sur toutes les tables.
-- Si tu relances ce script plus tard, ces lignes garantissent que la RLS reste désactivée.
alter table catechese_app_config disable row level security;
alter table catechese_app_users disable row level security;
alter table catechese_classes disable row level security;
alter table catechese_catechumenes disable row level security;
alter table catechese_parents disable row level security;
alter table catechese_animateurs disable row level security;
alter table catechese_notes disable row level security;
alter table catechese_paiements disable row level security;
alter table catechese_depenses disable row level security;
alter table catechese_attestations disable row level security;
alter table catechese_actualites disable row level security;
alter table catechese_messages disable row level security;

function showToast(msg, isError=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(()=> t.className='toast', isError ? 6000 : 2500);
}
function esc(str){
  if(str===null||str===undefined) return '';
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadPublicConfig(){
  if(!sb) return;
  const {data, error} = await sb.from('catechese_app_config').select('*').eq('id',1).single();

/* ============================================================
   AUTHENTIFICATION
   ============================================================ */
async function handleLogin(){
  const nom = document.getElementById('loginNom').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';

  if(!nom || !pass){ errEl.textContent = "Veuillez remplir tous les champs."; return; }

  // Compte créateur "en dur" garanti (toujours accessible même avant configuration des autres comptes)
  if(nom === 'Jean Marc' && pass === 'jeanmarcamp'){
    currentUser = {id:'createur-defaut', nom:'Jean Marc', role:'createur', photo_url:''};
    return enterApp();
  }

  if(!sb){ errEl.textContent = "Supabase n'est pas encore configuré (voir haut du fichier)."; return; }

  const {data, error} = await sb.from('catechese_app_users').select('*').eq('nom_utilisateur', nom).eq('mot_de_passe', pass).maybeSingle();
  if(error || !data){ errEl.textContent = "Nom d'utilisateur ou mot de passe incorrect."; return; }

  currentUser = data;
  enterApp();
}

function handleLogout(){
  arreterSuiviTempsReel();
  currentUser = null;
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginNom').value='';
  document.getElementById('loginPass').value='';
}

function enterApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  document.getElementById('topbarUserName').textContent = currentUser.nom;
  const roleBadge = document.getElementById('topbarUserRole');
  roleBadge.textContent = roleLabel(currentUser.role);
  if(appConfig && appConfig.nom_paroisse) document.getElementById('topbarParoisse').textContent = appConfig.nom_paroisse.toUpperCase();
  renderSidebar();
  navigateTo('accueil');
  demarrerSuiviTempsReel();
}

function roleLabel(r){
  return {createur:'Créateur', responsable:'Responsable', secretariat:'Secrétariat', animateur:'Animateur', aumonier:'Aumônier'}[r] || r;
}

/* ============================================================
   PRÉSENCE EN LIGNE & NOTIFICATIONS DE MESSAGES
   ============================================================ */
let presenceCache = [];
let notificationsCache = [];
let suiviTempsReelInterval = null;
const SEUIL_EN_LIGNE_MS = 45000; // considéré "en ligne" si vu il y a moins de 45s
const FREQUENCE_SUIVI_MS = 15000; // vérifie toutes les 15s

function demarrerSuiviTempsReel(){
  if(!sb) return;
  arreterSuiviTempsReel();
  const cycle = async ()=>{
    await majPresence();
    await chargerPresence();
    await chargerNotifications();
  };
  cycle();
  suiviTempsReelInterval = setInterval(cycle, FREQUENCE_SUIVI_MS);
}

function arreterSuiviTempsReel(){
  if(suiviTempsReelInterval){ clearInterval(suiviTempsReelInterval); suiviTempsReelInterval = null; }
}

async function majPresence(){
  if(!sb || !currentUser) return;
  try{
    await sb.from('catechese_presence').upsert({nom: currentUser.nom, derniere_connexion: new Date().toISOString()});
  }catch(e){ console.error(e); }
}

async function chargerPresence(){
  if(!sb) return;
  try{
    const seuil = new Date(Date.now() - SEUIL_EN_LIGNE_MS).toISOString();
    const {data} = await sb.from('catechese_presence').select('nom').gte('derniere_connexion', seuil);
    presenceCache = (data||[]).map(p=>p.nom);
  }catch(e){ console.error(e); presenceCache = []; }
  renderPresenceWidget();
  // Si la messagerie est ouverte, rafraîchir les pastilles de présence des contacts
  if(document.getElementById('messagerieBody') && typeof renderMessagerieLayout==='function' && messagerieContact===null){
    renderMessagerieLayout();
  }
}

function renderPresenceWidget(){
  const btn = document.getElementById('presenceBtn');
  if(!btn) return;
  btn.textContent = `🟢 ${presenceCache.length} en ligne`;
  const dropdown = document.getElementById('presenceDropdown');
  if(!dropdown) return;
  dropdown.innerHTML = presenceCache.length
    ? presenceCache.map(nom=>`<div><span class="presenceDot"></span>${esc(nom)}</div>`).join('')
    : `<div style="color:var(--gris)">Personne d'autre en ligne</div>`;
}

function togglePresenceDropdown(){
  document.getElementById('presenceDropdown').classList.toggle('open');
}

async function chargerNotifications(){
  if(!sb || !currentUser) return;
  try{
    const {data} = await sb.from('catechese_messages').select('expediteur_nom, contenu, type_message, created_at')
      .eq('destinataire_nom', currentUser.nom).eq('lu', false).order('created_at', {ascending:false});
    const messages = data || [];
    // Regrouper par expéditeur : un seul aperçu par personne + compteur
    const groupes = {};
    messages.forEach(m=>{
      if(!groupes[m.expediteur_nom]){
        groupes[m.expediteur_nom] = {expediteur_nom: m.expediteur_nom, dernierMessage: m, count: 0};
      }
      groupes[m.expediteur_nom].count++;
    });
    notificationsCache = Object.values(groupes);
  }catch(e){ console.error(e); notificationsCache = []; }
  renderNotifPanel();
  mettreAJourBadgeMessagerie();
}

function renderNotifPanel(){
  const panel = document.getElementById('notifPanel');
  if(!panel) return;
  panel.innerHTML = notificationsCache.map(n=>{
    const aperçu = n.dernierMessage.type_message !== 'texte' ? '📎 Fichier joint' : (n.dernierMessage.contenu||'');
    return `
    <div class="notifCard" onclick="ouvrirNotification('${esc(n.expediteur_nom)}')">
      <b>${esc(n.expediteur_nom)}</b> ${n.count>1?`<span class="menuBadge" style="margin-left:6px">${n.count}</span>`:''}
      <div class="notifPreview">${esc(aperçu)}</div>
    </div>`;
  }).join('');
}

function mettreAJourBadgeMessagerie(){
  const totalNonLu = notificationsCache.reduce((s,n)=>s+n.count, 0);
  const menuItem = document.getElementById('menu-messagerie');
  if(!menuItem) return;
  let badge = menuItem.querySelector('.menuBadge');
  if(totalNonLu > 0){
    if(!badge){
      badge = document.createElement('span');
      badge.className = 'menuBadge';
      menuItem.appendChild(badge);
    }
    badge.textContent = totalNonLu;
  } else if(badge){
    badge.remove();
  }
}

async function ouvrirNotification(nom){
  document.getElementById('presenceDropdown')?.classList.remove('open');
  navigateTo('messagerie');
  await new Promise(r=>setTimeout(r, 150));
  await ouvrirConversation(nom);
}

   ============================================================ */
function renderSidebar(){
  const sidebarEl = document.getElementById('sidebar');
  sidebarEl.innerHTML = '';
  MENU_ITEMS.filter(m => m.roles.includes(currentUser.role)).forEach(m=>{
    const btn = document.createElement('button');
    btn.className = 'menuItem';
    btn.id = 'menu-'+m.key;
    btn.innerHTML = `<span class="dot"></span><span>${m.icon}</span><span>${m.label}</span>`;
    btn.onclick = ()=> navigateTo(m.key);
    sidebarEl.appendChild(btn);
  });
}

let currentPageKey = 'accueil';

function navigateTo(key){
  currentPageKey = key;
  document.querySelectorAll('.menuItem').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('menu-'+key);
  if(btn) btn.classList.add('active');
  const renderers = {
    option: renderOption,
    inscriptions: renderInscriptions,
    inscription_catechese: renderInscriptionCatechese,
    accueil: renderAccueil,
    repartition: renderRepartition,
    notes: renderNotes,
    resultats: renderResultats,
    comptabilite: renderComptabilite,
    actualite: renderActualite,
    messagerie: renderMessagerie,
    attestations: renderAttestations,
  };
  const item = MENU_ITEMS.find(m=>m.key===key);
  if(renderers[key]) renderers[key]();
  else renderPlaceholder(item);
  if(window.innerWidth <= 700){ document.getElementById('sidebar').classList.remove('open'); }
}

async function actualiserPageCourante(){
  const btn = document.getElementById('refreshBtn');
  if(btn){ btn.disabled = true; btn.textContent = '🔄 Actualisation…'; }
  await navigateTo(currentPageKey);
  if(btn){ btn.disabled = false; btn.textContent = '🔄 Actualiser'; }
  showToast("Page actualisée ✓");
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

      </div>

        <h3>Accès rapide</h3>
        <div class="rowFlex" id="accueilShortcuts"></div>
      </div>
    </div>`;

  // Raccourcis selon le rôle
  const shortcuts = MENU_ITEMS.filter(m => m.key!=='accueil' && m.roles.includes(currentUser.role));
  document.getElementById('accueilShortcuts').innerHTML = shortcuts.map(m=>`

      sb.from('catechese_catechumenes').select('*', {count:'exact', head:true}),
      sb.from('catechese_animateurs').select('*', {count:'exact', head:true}),
      sb.from('catechese_classes').select('*', {count:'exact', head:true}),
    ]);
    nbCatechumenes = results[0].count ?? 0;
    nbAnimateurs = results[1].count ?? 0;

  if(erreurChargement){

      <div style="color:var(--gris);font-size:13px">Classes de catéchèse créées</div>
    </div>`;
}

async function uploadFile(file, prefix){
  const path = `${prefix}-${Date.now()}-${file.name}`;
  const {error} = await sb.storage.from('catechese-fichiers').upload(path, file, {upsert:true});
  if(error) return null;
  const {data} = sb.storage.from('catechese-fichiers').getPublicUrl(path);
  return data.publicUrl;
}

async function saveInscription(){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  const nom = document.getElementById('fNom').value.trim();
  const prenom = document.getElementById('fPrenom').value.trim();
  if(!nom || !prenom){ showToast("Nom et prénom sont requis", true); return; }

  const payload = {
    nom, prenom,
    date_naissance: document.getElementById('fDateNaissance').value || null,
    lieu_naissance: document.getElementById('fLieuNaissance').value.trim(),
    quartier: document.getElementById('fQuartier').value.trim(),
    ceb: document.getElementById('fCeb').value.trim(),
    telephone: document.getElementById('fTelephone').value.trim(),
    categorie: document.getElementById('fCategorie').value,
    statut: document.getElementById('fStatut').value,
    baptise: document.getElementById('fBaptise').checked,
    date_bapteme: document.getElementById('fDateBapteme').value || null,
    lieu_bapteme: document.getElementById('fLieuBapteme').value.trim(),
  };

  const photoInput = document.getElementById('fPhoto');
  if(photoInput.files[0]){
    const url = await uploadFile(photoInput.files[0], 'catechumene-photo');
    if(url) payload.photo_url = url;
  }
  const piecesInput = document.getElementById('fPieces');
  if(piecesInput.files.length){
    const urls = [];
    for(const f of piecesInput.files){
      const url = await uploadFile(f, 'catechumene-piece');
      if(url) urls.push(url);
    }
    payload.pieces_jointes = urls;
  }

  let catechumeneId = inscriptionEditId;
  if(catechumeneId){
    const {error} = await sb.from('catechese_catechumenes').update(payload).eq('id', catechumeneId);
    if(error){ showToast("Erreur : "+error.message, true); return; }
  } else {
    const {data, error} = await sb.from('catechese_catechumenes').insert(payload).select().single();
    if(error){ showToast("Erreur : "+error.message, true); return; }
    catechumeneId = data.id;
  }

  const parentPayload = {
    catechumene_id: catechumeneId,
    nom_pere: document.getElementById('fNomPere').value.trim(),
    prenom_pere: document.getElementById('fPrenomPere').value.trim(),
    nom_mere: document.getElementById('fNomMere').value.trim(),
    prenom_mere: document.getElementById('fPrenomMere').value.trim(),
    contact_parents: document.getElementById('fContactParents').value.trim(),
  };
  const {data:existingParent} = await sb.from('catechese_parents').select('id').eq('catechumene_id', catechumeneId).maybeSingle();
  if(existingParent){
    await sb.from('catechese_parents').update(parentPayload).eq('id', existingParent.id);
  } else {
    await sb.from('catechese_parents').insert(parentPayload);
  }

  showToast("Catéchumène enregistré ✓");
  await loadCatechumenes();
  renderInscriptionsList();
}

async function deleteCatechumene(id){
  if(!confirm("Supprimer ce catéchumène et ses informations de parents ?")) return;
  const {error} = await sb.from('catechese_catechumenes').delete().eq('id', id);
  if(error){ showToast("Erreur : "+error.message, true); return; }
  showToast("Catéchumène supprimé");
  await loadCatechumenes();
  renderInscriptionsList();
}

async function renderRepartition(){
  document.getElementById('content').innerHTML = `
    <h2>🏫 Répartition classes & animateurs</h2>
    <div class="breadcrumb">Choisis une classe pour voir sa liste et lui assigner un animateur</div>
    <div id="repartitionBody"><div class="card"><div class="placeholder">Chargement…</div></div></div>`;
  if(!sb){ document.getElementById('repartitionBody').innerHTML = noSbCard(); return; }
  try{
    const [{data:cls}, {data:anim}] = await Promise.all([
      sb.from('catechese_classes').select('*').order('nom'),
      sb.from('catechese_animateurs').select('*').order('nom'),
    ]);
    classesCache = cls || [];
    animateursCache = anim || [];
  }catch(e){
    console.error(e);
    const el = document.getElementById('repartitionBody');
    if(el) el.innerHTML = erreurCard();
    return;
  }
  const el = document.getElementById('repartitionBody');
  if(!el) return;
  renderRepartitionListe();
}

function erreurCard(){
  return `<div class="card"><div class="placeholder">Impossible de charger les données. Vérifie que le script SQL a bien été exécuté dans Supabase (Option → Script SQL).</div></div>`;
}

function noSbCard(){
  return `<div class="card"><div class="placeholder">Connecte Supabase (voir Option) pour utiliser ce module.</div></div>`;
}

function renderRepartitionListe(){
  // Regrouper les classes par catégorie pour le bouton "liste totale"
  const parCategorie = {};
  classesCache.forEach(c=>{ (parCategorie[c.categorie] = parCategorie[c.categorie]||[]).push(c); });

  const cards = classesCache.map(c=>{
    const anim = animateursCache.find(a=>a.id===c.animateur_id);
    return `
    <div class="card" style="cursor:pointer" onclick="renderRepartitionClasse('${c.id}')">
      <div class="rowFlex" style="justify-content:space-between">
        <div>
          <h3 style="border:none;padding:0;margin:0">${esc(c.nom)}</h3>
          <div style="color:var(--gris);font-size:12px">${categorieLabel(c.categorie)} · max ${c.effectif_max}</div>
        </div>
        <div class="rowFlex">
          ${anim ? (anim.photo_url ? `<img src="${esc(anim.photo_url)}" style="width:34px;height:34px;border-radius:50%;object-fit:cover">` : '') : ''}
          <span style="font-size:13px;color:${anim?'var(--bleu-nuit)':'var(--gris)'}">${anim ? esc(anim.nom)+' '+esc(anim.prenom) : 'Aucun animateur assigné'}</span>
        </div>
      </div>
    </div>`;
  }).join('') || `<div class="card"><div class="placeholder">Aucune classe créée pour le moment. Va dans Option → Classes de catéchèse.</div></div>`;

  const boutonsTotal = Object.keys(parCategorie).map(cat=>`
    <button class="smallBtn edit" onclick="renderListeTotale('${cat}')">📋 Liste totale — ${categorieLabel(cat)}</button>
  `).join('');

  document.getElementById('repartitionBody').innerHTML = `
    <div class="rowFlex" style="margin-bottom:14px">${boutonsTotal}</div>
    ${cards}`;
}

async function renderRepartitionClasse(classeId){

async function renderNotesClasse(classeId){
  const cls = classesCache.find(c=>c.id===classeId);
  const {data:catechumenes} = await sb.from('catechese_catechumenes').select('*').eq('class_id', classeId).order('nom');
  const ids = (catechumenes||[]).map(c=>c.id);
  let notesMap = {};
  if(ids.length){
    const {data:notes} = await sb.from('catechese_notes').select('*').in('catechumene_id', ids);
    (notes||[]).forEach(n=>{ notesMap[n.catechumene_id] = n; });
  }

  const rows = (catechumenes||[]).map(c=>{
    const n = notesMap[c.id] || {};
    const cols = [1,2,3,4,5,6].map(i=>`<td><input type="number" step="0.01" min="0" max="20" style="width:60px;padding:6px" id="note_${i}_${c.id}" value="${n['note'+i] ?? ''}" oninput="recalculerMoyenne('${c.id}')"></td>`).join('');
    return `<tr><td>${esc(c.nom)} ${esc(c.prenom)}</td>${cols}<td style="background:#0f2447;color:#fff;font-weight:700;text-align:center" id="moy_${c.id}">${n.moyenne ?? '—'}</td></tr>`;
  }).join('') || `<tr><td colspan="8" style="text-align:center;color:var(--gris)">Aucun catéchumène dans cette classe</td></tr>`;

  document.getElementById('notesBody').innerHTML = `
    <button class="btn ghost" style="width:auto;padding:8px 16px;margin-bottom:14px" onclick="renderNotesListeClasses()">← Retour aux classes</button>
    <div class="card">
      <h3>${esc(cls.nom)} — Notes et moyennes</h3>
      <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Catéchumène</th><th>N1</th><th>N2</th><th>N3</th><th>N4</th><th>N5</th><th>N6</th><th>Moyenne</th></tr></thead>
        <tbody id="notesTableBody">${rows}</tbody>
      </table>
      </div>
      <div style="margin-top:16px"><button class="btn gold" style="width:auto;padding:11px 22px" onclick="enregistrerNotes('${classeId}')">Enregistrer toutes les notes</button></div>
    </div>`;
}

function recalculerMoyenne(catechumeneId){
  const valeurs = [1,2,3,4,5,6].map(i=>{
    const el = document.getElementById(`note_${i}_${catechumeneId}`);
    const v = el.value.trim();
    return v === '' ? null : parseFloat(v);
  }).filter(v=>v !== null && !isNaN(v));
  const moyEl = document.getElementById('moy_'+catechumeneId);
  if(valeurs.length === 0){ moyEl.textContent = '—'; return; }
  const moyenne = valeurs.reduce((a,b)=>a+b,0) / valeurs.length;
  moyEl.textContent = moyenne.toFixed(2);
}

async function enregistrerNotes(classeId){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  const {data:catechumenes} = await sb.from('catechese_catechumenes').select('id').eq('class_id', classeId);
  for(const c of (catechumenes||[])){
    const valeurs = {};
    let somme = 0, nb = 0;
    for(let i=1;i<=6;i++){
      const el = document.getElementById(`note_${i}_${c.id}`);
      const v = el ? el.value.trim() : '';
      if(v !== ''){ const n = parseFloat(v); valeurs['note'+i] = n; somme += n; nb++; }
      else { valeurs['note'+i] = null; }
    }
    valeurs.moyenne = nb > 0 ? Math.round((somme/nb)*100)/100 : null;
    valeurs.annee_catechese = appConfig?.annee_catechese || null;

    const {data:existing} = await sb.from('catechese_notes').select('id').eq('catechumene_id', c.id).maybeSingle();
    if(existing){
      await sb.from('catechese_notes').update(valeurs).eq('id', existing.id);
    } else {
      await sb.from('catechese_notes').insert({catechumene_id: c.id, ...valeurs});
    }
  }
  showToast("Notes enregistrées ✓");
}

async function onSelectCatechumenePaiement(){

  const {data:paiements} = await sb.from('catechese_paiements').select('avance').eq('catechumene_id', id).eq('annee_catechese', appConfig?.annee_catechese||'');
  const dejaPaye = (paiements||[]).reduce((s,p)=>s+(p.avance||0),0);

function recalculerReste(){
  const montantTotal = parseFloat(document.getElementById('payMontantTotal').value)||0;

  const dejaPayeTxt = document.getElementById('payDejaPaye').value || '0';
  const dejaPaye = parseFloat(dejaPayeTxt) || 0;
  const reste = montantTotal - dejaPaye - avance;
  document.getElementById('payReste').value = reste + ' FCFA';
}

async function renderActualite(){
  document.getElementById('content').innerHTML = `
    <h2>📰 Actualité</h2>
    <div class="breadcrumb">Publications de la paroisse</div>
    <div id="actualiteBody"><div class="card"><div class="placeholder">Chargement…</div></div></div>`;
  if(!sb){ document.getElementById('actualiteBody').innerHTML = noSbCard(); return; }
  await chargerActualites();
}

function peutPublier(){
  return ['createur','responsable'].includes(currentUser.role);
}

async function chargerActualites(){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  const {data} = await sb.from('catechese_actualites').select('*').order('created_at', {ascending:false});
  const actus = data || [];

  const formPublication = peutPublier() ? `
    <div class="card">
      <h3>Nouvelle publication</h3>
      <textarea id="actuContenu" placeholder="Écris ton message ici…" style="width:100%;min-height:90px;padding:12px;border:1.5px solid #dfe4ee;border-radius:9px;font-family:inherit"></textarea>
      <div style="margin-top:12px"><button class="btn gold" style="width:auto;padding:11px 22px" onclick="publierActualite()">Publier</button></div>
    </div>` : '';

  const items = actus.map(a=>{
    const lu = Array.isArray(a.lu_par) && a.lu_par.includes(currentUser.nom);
    const couleur = lu ? '#1f2937' : 'var(--rouge-bordeaux)';
    const actions = peutPublier() ? `
      <div class="rowFlex" style="margin-top:8px">
        <button class="smallBtn edit" onclick="modifierActualite('${a.id}')">Modifier</button>
        <button class="smallBtn del" onclick="supprimerActualite('${a.id}')">Supprimer</button>
      </div>` : '';
    return `
      <div class="card" style="border-left:4px solid ${lu?'#e5e9f2':'var(--rouge-bordeaux)'}">
        <div style="color:${couleur};white-space:pre-wrap">${esc(a.contenu)}</div>
        <div style="color:var(--gris);font-size:12px;margin-top:8px">${esc(a.auteur)} · ${new Date(a.created_at).toLocaleString('fr-FR')}</div>
        ${actions}
      </div>`;
  }).join('') || `<div class="card"><div class="placeholder">Aucune publication pour le moment</div></div>`;

  document.getElementById('actualiteBody').innerHTML = formPublication + items;

  // Marquer comme lues les publications non lues par l'utilisateur courant
  for(const a of actus){
    const lu = Array.isArray(a.lu_par) && a.lu_par.includes(currentUser.nom);
    if(!lu){
      const nouveauxLecteurs = [...(a.lu_par||[]), currentUser.nom];
      sb.from('catechese_actualites').update({lu_par: nouveauxLecteurs}).eq('id', a.id);
    }
  }
}

async function publierActualite(){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  const contenu = document.getElementById('actuContenu').value.trim();
  if(!contenu){ showToast("Écris un message avant de publier", true); return; }
  const {error} = await sb.from('catechese_actualites').insert({auteur: currentUser.nom, contenu, lu_par:[currentUser.nom]});
  if(error){ showToast("Erreur : "+error.message, true); return; }
  showToast("Publication envoyée ✓");
  chargerActualites();
}

async function modifierActualite(id){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  const nouveauContenu = prompt("Modifier la publication :");
  if(nouveauContenu === null || !nouveauContenu.trim()) return;
  await sb.from('catechese_actualites').update({contenu: nouveauContenu.trim()}).eq('id', id);
  showToast("Publication modifiée ✓");
  chargerActualites();
}

async function supprimerActualite(id){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  if(!confirm("Supprimer cette publication ?")) return;
  await sb.from('catechese_actualites').delete().eq('id', id);
  showToast("Publication supprimée");
  chargerActualites();
}

async function ouvrirConversation(nom){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  messagerieContact = nom;
  await chargerMessages();
}

async function chargerMessages(){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  const {data} = await sb.from('catechese_messages').select('*')
    .or(`and(expediteur_nom.eq.${currentUser.nom},destinataire_nom.eq.${messagerieContact}),and(expediteur_nom.eq.${messagerieContact},destinataire_nom.eq.${currentUser.nom})`)
    .order('created_at');
  const messages = data || [];

  // Marquer comme lus les messages reçus de ce contact (la notification disparaît)
  const idsNonLus = messages.filter(m=>m.destinataire_nom===currentUser.nom && !m.lu).map(m=>m.id);
  if(idsNonLus.length){
    await sb.from('catechese_messages').update({lu:true}).in('id', idsNonLus);
    chargerNotifications();
  }

  const bulles = messages.map(m=>{
    const moi = m.expediteur_nom === currentUser.nom;
    let media = '';
    if(m.type_message==='photo') media = `<img src="${esc(m.media_url)}" style="max-width:200px;border-radius:8px;display:block;margin-bottom:6px">`;
    else if(m.type_message==='video') media = `<video src="${esc(m.media_url)}" controls style="max-width:220px;border-radius:8px;display:block;margin-bottom:6px"></video>`;
    else if(m.type_message==='vocal') media = `<audio src="${esc(m.media_url)}" controls style="display:block;margin-bottom:6px"></audio>`;
    const actions = moi ? `<div class="rowFlex" style="margin-top:4px">
        <button class="smallBtn edit" style="padding:3px 8px;font-size:11px" onclick="modifierMessage('${m.id}')">Modifier</button>
        <button class="smallBtn del" style="padding:3px 8px;font-size:11px" onclick="supprimerMessage('${m.id}')">Supprimer</button>
      </div>` : '';
    return `
      <div style="display:flex;justify-content:${moi?'flex-end':'flex-start'};margin-bottom:10px">
        <div style="max-width:70%;background:${moi?'var(--bleu-nuit)':'#eef2fb'};color:${moi?'#fff':'#1f2937'};padding:10px 14px;border-radius:12px">
          ${media}
          ${m.contenu ? `<div>${esc(m.contenu)}${m.modifie?' <i style="opacity:.6;font-size:11px">(modifié)</i>':''}</div>` : ''}
          <div style="font-size:10px;opacity:.7;margin-top:4px">${new Date(m.created_at).toLocaleString('fr-FR')}</div>
          ${actions}
        </div>
      </div>`;
  }).join('') || `<div style="color:var(--gris);text-align:center;padding:20px">Aucun message. Écris le premier !</div>`;

  document.getElementById('chatPanel').innerHTML = `
    <div class="rowFlex" style="justify-content:space-between;margin-bottom:10px">
      <h3 style="border:none;padding:0;margin:0">${esc(messagerieContact)}</h3>
      <button class="smallBtn edit" onclick="chargerMessages()">🔄 Actualiser</button>
    </div>
    <div style="max-height:380px;overflow-y:auto;padding:6px" id="messagesListe">${bulles}</div>
    <div class="rowFlex" style="margin-top:12px">
      <input id="msgTexte" placeholder="Écris un message…" style="flex:1;padding:10px 12px;border:1.5px solid #dfe4ee;border-radius:9px">
      <input type="file" id="msgFichier" accept="image/*,video/*,audio/*" style="width:150px">
      <button class="btn gold" style="width:auto;padding:10px 18px" onclick="envoyerMessage()">Envoyer</button>
    </div>`;
  const liste = document.getElementById('messagesListe');
  if(liste) liste.scrollTop = liste.scrollHeight;
}

function typeFichierMessage(file){
  if(file.type.startsWith('image/')) return 'photo';
  if(file.type.startsWith('video/')) return 'video';
  if(file.type.startsWith('audio/')) return 'vocal';
  return 'photo';
}

async function envoyerMessage(){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  const texte = document.getElementById('msgTexte').value.trim();
  const fichierInput = document.getElementById('msgFichier');
  const fichier = fichierInput.files[0];
  if(!texte && !fichier){ showToast("Écris un message ou joins un fichier", true); return; }

  const payload = {
    expediteur_nom: currentUser.nom,
    destinataire_nom: messagerieContact,
    contenu: texte || null,
    type_message: 'texte',
  };
  if(fichier){
    const url = await uploadFile(fichier, 'message');
    if(url){ payload.media_url = url; payload.type_message = typeFichierMessage(fichier); }
  }
  const {error} = await sb.from('catechese_messages').insert(payload);
  if(error){ showToast("Erreur : "+error.message, true); return; }
  document.getElementById('msgTexte').value = '';
  fichierInput.value = '';
  chargerMessages();
}

async function modifierMessage(id){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  const nouveau = prompt("Modifier le message :");
  if(nouveau === null || !nouveau.trim()) return;
  await sb.from('catechese_messages').update({contenu: nouveau.trim(), modifie:true}).eq('id', id);
  chargerMessages();
}

async function supprimerMessage(id){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  if(!confirm("Supprimer ce message ?")) return;
  await sb.from('catechese_messages').delete().eq('id', id);
  chargerMessages();
}

    const file = fileInput.files[0];
    const path = `paroisse-logo-${Date.now()}-${file.name}`;
    const {error:upErr} = await sb.storage.from('catechese-fichiers').upload(path, file, {upsert:true});
    if(upErr){
      showToast("Le logo n'a pas pu être envoyé : "+upErr.message+" (vérifie que le bucket 'catechese-fichiers' existe et est public)", true);
    } else {
      const {data:pub} = sb.storage.from('catechese-fichiers').getPublicUrl(path);
      payload.logo_url = pub.publicUrl;
    }
  }
  const {error} = await sb.from('catechese_app_config').upsert(payload);
  if(error){ showToast("Erreur : "+error.message, true); return; }
  await loadPublicConfig();
  showToast("Informations de la paroisse enregistrées ✓");
  renderOptionParoisse();
}

function renderOptionPeriode(){
  const c = appConfig || {};
  document.getElementById('optionTabContent').innerHTML = `
    <div class="card">
      <h3>Période d'utilisation de l'application</h3>
      <div class="grid2">
        <div class="field"><label>Date de début</label><input id="optDebut" type="date" value="${c.periode_debut||''}"></div>
        <div class="field"><label>Date de fin</label><input id="optFin" type="date" value="${c.periode_fin||''}"></div>
      </div>
      <p style="font-size:12px;color:var(--gris);margin-top:8px">Passé cette date, seul le créateur pourra modifier la période pour prolonger l'accès à l'application.</p>
      <div style="margin-top:16px"><button class="btn gold" style="width:auto;padding:11px 22px" onclick="saveOptionPeriode()">Enregistrer</button></div>
    </div>`;
}

async function saveOptionPeriode(){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  const payload = {
    id:1,
    periode_debut: document.getElementById('optDebut').value || null,
    periode_fin: document.getElementById('optFin').value || null,
  };
  const {error} = await sb.from('catechese_app_config').upsert(payload);
  if(error){ showToast("Erreur : "+error.message, true); return; }
  await loadPublicConfig();
  showToast("Période enregistrée ✓");
}

async function renderOptionClasses(){
  document.getElementById('optionTabContent').innerHTML = `<div class="card"><div class="placeholder">Chargement…</div></div>`;
  if(sb){
    const {data} = await sb.from('catechese_classes').select('*').order('created_at');
    classesCache = data || [];
  }
  const rows = classesCache.map(cl=>`
    <tr>
      <td>${esc(cl.nom)}</td>
      <td>${esc(cl.categorie)}</td>
      <td>${esc(cl.effectif_max)}</td>
      <td><button class="smallBtn del" onclick="deleteClasse('${cl.id}')">Supprimer</button></td>
    </tr>`).join('') || `<tr><td colspan="4" style="text-align:center;color:var(--gris)">Aucune classe pour le moment</td></tr>`;

  document.getElementById('optionTabContent').innerHTML = `
    <div class="card">
      <h3>Ajouter une classe de catéchèse</h3>
      <div class="grid2">
        <div class="field"><label>Nom de la classe</label><input id="newClasseNom" placeholder="ex: 1ère année enfants - A"></div>
        <div class="field"><label>Catégorie</label>
          <select id="newClasseCategorie">
            <option value="enfants">Catéchèse enfants</option>
            <option value="jeunes">Catéchèse jeunes</option>
            <option value="adultes">Catéchèse adultes</option>
          </select>
        </div>
        <div class="field"><label>Effectif maximal</label><input id="newClasseMax" type="number" value="30"></div>
      </div>
      <button class="btn gold" style="width:auto;padding:11px 22px" onclick="addClasse()">Ajouter la classe</button>
    </div>
    <div class="card">
      <h3>Classes existantes (${classesCache.length})</h3>
      <table>
        <thead><tr><th>Nom</th><th>Catégorie</th><th>Effectif max</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function addClasse(){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  const nom = document.getElementById('newClasseNom').value.trim();
  const categorie = document.getElementById('newClasseCategorie').value;
  const max = parseInt(document.getElementById('newClasseMax').value)||30;
  if(!nom){ showToast("Le nom de la classe est requis", true); return; }
  const {error} = await sb.from('catechese_classes').insert({nom, categorie, effectif_max:max});
  if(error){ showToast("Erreur : "+error.message, true); return; }
  showToast("Classe ajoutée ✓");
  renderOptionClasses();
}

async function deleteClasse(id){
  if(!confirm("Supprimer cette classe ?")) return;
  const {error} = await sb.from('catechese_classes').delete().eq('id', id);
  if(error){ showToast("Erreur : "+error.message, true); return; }
  showToast("Classe supprimée");
  renderOptionClasses();
}

async function renderOptionUtilisateurs(){
  document.getElementById('optionTabContent').innerHTML = `<div class="card"><div class="placeholder">Chargement…</div></div>`;
  if(sb){
    const {data} = await sb.from('catechese_app_users').select('*').order('created_at');
    usersCache = data || [];
  }
  const rows = usersCache.map(u=>`
    <tr>
      <td>${esc(u.nom)}</td>
      <td>${esc(u.nom_utilisateur||'—')}</td>
      <td><span class="badge ${u.role}">${roleLabel(u.role)}</span></td>
      <td><button class="smallBtn del" onclick="deleteUser('${u.id}')">Supprimer</button></td>
    </tr>`).join('') || `<tr><td colspan="4" style="text-align:center;color:var(--gris)">Aucun utilisateur ajouté (en dehors du créateur)</td></tr>`;

  document.getElementById('optionTabContent').innerHTML = `
    <div class="card">
      <h3>Ajouter un utilisateur</h3>
      <div class="grid2">
        <div class="field"><label>Nom complet</label><input id="newUserNom" placeholder="ex: Carmel Kouassi"></div>
        <div class="field"><label>Nom d'utilisateur (identifiant de connexion)</label><input id="newUserLogin" placeholder="ex: carmel"></div>
        <div class="field"><label>Mot de passe</label><input id="newUserPass" type="text" placeholder="Mot de passe"></div>
        <div class="field"><label>Rôle</label>
          <select id="newUserRole">
            <option value="responsable">Responsable catéchèse</option>
            <option value="secretariat">Secrétariat</option>
            <option value="animateur">Animateur</option>
            <option value="aumonier">Aumônier</option>
          </select>
        </div>
      </div>
      <button class="btn gold" style="width:auto;padding:11px 22px" onclick="addUser()">Ajouter l'utilisateur</button>
    </div>
    <div class="card">
      <h3>Utilisateurs (${usersCache.length + 1})</h3>
      <table>
        <thead><tr><th>Nom complet</th><th>Nom d'utilisateur</th><th>Rôle</th><th></th></tr></thead>
        <tbody>
          <tr><td>Jean Marc</td><td>Jean Marc</td><td><span class="badge createur">Créateur</span></td><td style="color:var(--gris);font-size:12px">Compte principal</td></tr>
          ${rows}
        </tbody>
      </table>
    </div>`;
}

function renderOptionSql(){
  document.getElementById('optionTabContent').innerHTML = `
    <div class="card">
      <h3>Script SQL de configuration Supabase</h3>
      <p style="font-size:13px;color:var(--gris);margin-bottom:10px">
        Ce script crée toutes les tables nécessaires à l'application (préfixées <code>catechese_</code> pour ne pas entrer en conflit avec un autre projet, comme ton appli d'association, si tu utilises le même projet Supabase gratuit).
        Copie tout, colle-le dans <b>Supabase → SQL Editor → New query</b>, puis clique <b>Run</b>. N'oublie pas aussi de créer un bucket de stockage public nommé <code>catechese-fichiers</code> dans <b>Storage</b>.
      </p>
      <textarea id="sqlBox" readonly style="width:100%;height:360px;font-family:monospace;font-size:12px;padding:12px;border:1.5px solid #dfe4ee;border-radius:9px;background:#0f2447;color:#d6e4ff;">${esc(SQL_SCHEMA)}</textarea>
      <div style="margin-top:12px"><button class="btn gold" style="width:auto;padding:11px 22px" onclick="copySqlScript()">Copier le script</button></div>
    </div>`;
}

function copySqlScript(){
  const box = document.getElementById('sqlBox');
  box.select();
  box.setSelectionRange(0, 999999);
  navigator.clipboard.writeText(SQL_SCHEMA).then(()=>{
    showToast("Script SQL copié ✓");
  }).catch(()=>{
    document.execCommand('copy');
    showToast("Script SQL copié ✓");
  });
}

async function addUser(){
  if(!sb){ showToast("Supabase non configuré", true); return; }
  const nom = document.getElementById('newUserNom').value.trim();
  const nom_utilisateur = document.getElementById('newUserLogin').value.trim();
  const mot_de_passe = document.getElementById('newUserPass').value;
  const role = document.getElementById('newUserRole').value;
  if(!nom || !nom_utilisateur || !mot_de_passe){ showToast("Nom complet, nom d'utilisateur et mot de passe requis", true); return; }
  if(nom_utilisateur.toLowerCase() === 'jean marc'){ showToast("Ce nom d'utilisateur est réservé au créateur", true); return; }
  const {error} = await sb.from('catechese_app_users').insert({nom, nom_utilisateur, mot_de_passe, role});
  if(error){
    if(error.message.includes('duplicate') || error.code==='23505') showToast("Ce nom d'utilisateur est déjà pris", true);
    else showToast("Erreur : "+error.message, true);
    return;
  }
  showToast("Utilisateur ajouté ✓");
  renderOptionUtilisateurs();
}

async function deleteUser(id){
  if(!confirm("Supprimer cet utilisateur ?")) return;
  const {error} = await sb.from('catechese_app_users').delete().eq('id', id);
  if(error){ showToast("Erreur : "+error.message, true); return; }
  showToast("Utilisateur supprimé");
  renderOptionUtilisateurs();
}
